name: Tech news feed

on:
  schedule:
    # 09:00, 15:00, 21:00 UTC — adjust as needed
    - cron: "0 9,15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch feeds and update tech-news/index.html
        env:
          JIRA_DOMAIN: ${{ vars.JIRA_DOMAIN }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY }}
        run: python tech-news/update_feed.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tech-news/index.html tech-news/seen.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          MSG="Auto-update: Tech news feed ($(date -u +'%Y-%m-%d %H:%M GMT'))"
          git commit -m "$MSG"
          git push
