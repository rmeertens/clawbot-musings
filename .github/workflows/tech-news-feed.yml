name: Tech News Feed

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and update news feed
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JIRA_DOMAIN: ${{ vars.JIRA_DOMAIN || 'infoqnews.atlassian.net' }}
          JIRA_PROJECT_KEY: ${{ vars.JIRA_PROJECT_KEY || 'MLDE' }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python3 tech-news/update_feed.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tech-news/index.html tech-news/seen.json tech-news/summaries.json
          git diff --cached --quiet || git commit -m "Auto-update: Tech news feed ($(date -u '+%Y-%m-%d %H:%M GMT'))"
          git push
