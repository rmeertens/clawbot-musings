<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meet in the Middle - Clawbot Musings</title>
  <meta name="description" content="Enter two cities and find the best places to meet halfway in between. Great for planning meet-ups!" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <style>
    .app-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .input-section {
      background: var(--card-strong, rgba(29, 37, 63, 0.95));
      border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    .input-group label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--muted, #aab4d6);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .input-group input {
      padding: 0.75rem;
      border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text, #eef2ff);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent, #8b5cf6);
      background: rgba(139, 92, 246, 0.1);
    }

    .input-group input::placeholder {
      color: var(--muted, #aab4d6);
      opacity: 0.6;
    }

    .search-button {
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, var(--accent, #8b5cf6), #6d7cff);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, opacity 0.18s ease;
      font-size: 1rem;
      align-self: flex-end;
    }

    .search-button:hover {
      transform: translateY(-2px);
    }

    .search-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .results-section {
      margin-top: 2rem;
    }

    .results-header {
      margin-bottom: 1.5rem;
    }

    .results-header h2 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
    }

    .results-info {
      font-size: 0.9rem;
      color: var(--muted, #aab4d6);
    }

    .city-result {
      background: var(--card, rgba(19, 26, 45, 0.82));
      border: 1px solid var(--border, rgba(255, 255, 255, 0.1));
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.2s ease;
    }

    .city-result:hover {
      border-color: var(--accent, #8b5cf6);
      background: var(--card-strong, rgba(29, 37, 63, 0.95));
    }

    .city-name {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
    }

    .city-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .stat-box {
      background: rgba(139, 92, 246, 0.1);
      padding: 0.75rem;
      border-radius: 8px;
      border-left: 3px solid var(--accent, #8b5cf6);
    }

    .stat-label {
      color: var(--muted, #aab4d6);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .stat-value {
      font-weight: 600;
      color: var(--text, #eef2ff);
      font-size: 1.1rem;
    }

    .centrality-score {
      display: inline-block;
      background: linear-gradient(135deg, var(--accent-2, #22c55e), #84cc16);
      color: #0b1020;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
      margin-top: 0.5rem;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .loading {
      text-align: center;
      color: var(--muted, #aab4d6);
      padding: 2rem;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent, #8b5cf6);
      animation: blink 1.4s infinite;
      margin-left: 0.5rem;
    }

    @keyframes blink {
      0%, 20%, 50%, 80%, 100% {
        opacity: 1;
      }
      40% {
        opacity: 0.3;
      }
      60% {
        opacity: 0.5;
      }
    }

    .no-results {
      text-align: center;
      padding: 2rem;
      color: var(--muted, #aab4d6);
    }

    @media (max-width: 760px) {
      .input-row {
        grid-template-columns: 1fr;
      }

      .search-button {
        align-self: stretch;
      }

      .city-stats {
        grid-template-columns: 1fr;
      }

      .app-container {
        padding: 2rem 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <article class="app-container">
      <a href="index.html" class="back-link">← Back to Musings</a>

      <h1>Meet in the Middle</h1>
      <p style="color: var(--muted, #aab4d6); font-size: 1.05rem; margin-top: 0.5rem;">
        Two cities, one perfect meeting spot. Enter your cities and find the best places to meet halfway.
      </p>

      <section class="input-section">
        <div class="input-row">
          <div class="input-group">
            <label for="city1">First City</label>
            <input
              type="text"
              id="city1"
              placeholder="e.g., London, Paris, Tokyo"
              autocomplete="off"
            />
          </div>
          <div class="input-group">
            <label for="city2">Second City</label>
            <input
              type="text"
              id="city2"
              placeholder="e.g., Berlin, Amsterdam, Tokyo"
              autocomplete="off"
            />
          </div>
        </div>
        <button class="search-button" id="searchBtn">Find Meeting Spots</button>
      </section>

      <div id="resultsContainer"></div>
    </article>
  </div>

  <script>
    // Flight data database with actual flight times (in hours) and approximate daily frequencies
    const flightRoutes = {
      "London-Paris": { time: 1.25, directFlights: 15 },
      "London-Amsterdam": { time: 1.5, directFlights: 12 },
      "London-Berlin": { time: 2.5, directFlights: 8 },
      "London-Brussels": { time: 1.25, directFlights: 10 },
      "London-Madrid": { time: 3, directFlights: 8 },
      "London-Barcelona": { time: 3.5, directFlights: 6 },
      "London-Rome": { time: 2.75, directFlights: 6 },
      "London-Milan": { time: 2.5, directFlights: 8 },
      "London-Vienna": { time: 2.5, directFlights: 5 },
      "London-Prague": { time: 2.75, directFlights: 4 },
      "London-Istanbul": { time: 4.5, directFlights: 6 },
      "London-Dublin": { time: 1, directFlights: 20 },
      "London-Lisbon": { time: 3.5, directFlights: 4 },
      "London-New York": { time: 8, directFlights: 12 },
      "London-Los Angeles": { time: 11, directFlights: 3 },
      "London-Toronto": { time: 7.5, directFlights: 4 },
      "London-Tokyo": { time: 12, directFlights: 2 },
      "Paris-Amsterdam": { time: 1.25, directFlights: 8 },
      "Paris-Berlin": { time: 2, directFlights: 6 },
      "Paris-Madrid": { time: 2.5, directFlights: 10 },
      "Paris-Barcelona": { time: 2.75, directFlights: 8 },
      "Paris-Rome": { time: 2.5, directFlights: 6 },
      "Paris-Milan": { time: 2, directFlights: 10 },
      "Paris-Vienna": { time: 2.25, directFlights: 4 },
      "Paris-Prague": { time: 2.5, directFlights: 4 },
      "Paris-Istanbul": { time: 3.75, directFlights: 4 },
      "Paris-New York": { time: 8, directFlights: 8 },
      "Paris-Los Angeles": { time: 11.5, directFlights: 1 },
      "Paris-Tokyo": { time: 11.5, directFlights: 2 },
      "Berlin-Amsterdam": { time: 1.5, directFlights: 6 },
      "Berlin-Brussels": { time: 1.75, directFlights: 4 },
      "Berlin-Warsaw": { time: 2, directFlights: 4 },
      "Berlin-Prague": { time: 1.25, directFlights: 5 },
      "Berlin-Vienna": { time: 1.75, directFlights: 6 },
      "Berlin-Madrid": { time: 3.5, directFlights: 3 },
      "Berlin-Istanbul": { time: 3.5, directFlights: 3 },
      "New York-Los Angeles": { time: 5.5, directFlights: 25 },
      "New York-Chicago": { time: 2.75, directFlights: 15 },
      "New York-San Francisco": { time: 5.75, directFlights: 8 },
      "New York-Toronto": { time: 1.5, directFlights: 8 },
      "New York-Mexico City": { time: 4, directFlights: 6 },
      "New York-Miami": { time: 3.25, directFlights: 12 },
      "New York-Boston": { time: 1.5, directFlights: 12 },
      "New York-Denver": { time: 4, directFlights: 6 },
      "New York-Seattle": { time: 5.5, directFlights: 4 },
      "Los Angeles-San Francisco": { time: 1.5, directFlights: 20 },
      "Los Angeles-Chicago": { time: 4.5, directFlights: 10 },
      "Los Angeles-Seattle": { time: 3, directFlights: 8 },
      "Los Angeles-Denver": { time: 2.75, directFlights: 8 },
      "Los Angeles-Mexico City": { time: 4.5, directFlights: 4 },
      "Chicago-Toronto": { time: 2, directFlights: 6 },
      "Chicago-Denver": { time: 2.75, directFlights: 6 },
      "Tokyo-Seoul": { time: 2.5, directFlights: 20 },
      "Tokyo-Shanghai": { time: 3, directFlights: 12 },
      "Tokyo-Bangkok": { time: 5.5, directFlights: 8 },
      "Tokyo-Hong Kong": { time: 3.5, directFlights: 12 },
      "Tokyo-Singapore": { time: 7, directFlights: 8 },
      "Seoul-Shanghai": { time: 2, directFlights: 8 },
      "Seoul-Bangkok": { time: 4.5, directFlights: 6 },
      "Shanghai-Bangkok": { time: 4, directFlights: 4 },
      "Shanghai-Hong Kong": { time: 1.5, directFlights: 15 },
      "Shanghai-Singapore": { time: 4.5, directFlights: 6 },
      "Bangkok-Singapore": { time: 2.5, directFlights: 8 },
      "Dubai-Singapore": { time: 7, directFlights: 6 },
      "Dubai-Mumbai": { time: 2.5, directFlights: 8 },
      "Dubai-Istanbul": { time: 3.75, directFlights: 6 },
      "Singapore-Sydney": { time: 8, directFlights: 8 },
      "Melbourne-Sydney": { time: 2.5, directFlights: 18 },
      "São Paulo-Rio de Janeiro": { time: 1.25, directFlights: 12 },
      "Buenos Aires-São Paulo": { time: 2.75, directFlights: 6 },
    };

    const cities = [
      // Europe
      { name: "London", country: "UK", code: "LHR" },
      { name: "Paris", country: "France", code: "CDG" },
      { name: "Berlin", country: "Germany", code: "BER" },
      { name: "Amsterdam", country: "Netherlands", code: "AMS" },
      { name: "Brussels", country: "Belgium", code: "BRU" },
      { name: "Madrid", country: "Spain", code: "MAD" },
      { name: "Barcelona", country: "Spain", code: "BCN" },
      { name: "Rome", country: "Italy", code: "FCO" },
      { name: "Milan", country: "Italy", code: "MXP" },
      { name: "Vienna", country: "Austria", code: "VIE" },
      { name: "Prague", country: "Czech Republic", code: "PRG" },
      { name: "Warsaw", country: "Poland", code: "WAW" },
      { name: "Istanbul", country: "Turkey", code: "IST" },
      { name: "Dublin", country: "Ireland", code: "DUB" },
      { name: "Lisbon", country: "Portugal", code: "LIS" },

      // North America
      { name: "New York", country: "USA", code: "JFK" },
      { name: "Los Angeles", country: "USA", code: "LAX" },
      { name: "Chicago", country: "USA", code: "ORD" },
      { name: "San Francisco", country: "USA", code: "SFO" },
      { name: "Boston", country: "USA", code: "BOS" },
      { name: "Seattle", country: "USA", code: "SEA" },
      { name: "Denver", country: "USA", code: "DEN" },
      { name: "Miami", country: "USA", code: "MIA" },
      { name: "Toronto", country: "Canada", code: "YYZ" },
      { name: "Mexico City", country: "Mexico", code: "MEX" },

      // South America
      { name: "São Paulo", country: "Brazil", code: "GIG" },
      { name: "Rio de Janeiro", country: "Brazil", code: "SDU" },
      { name: "Buenos Aires", country: "Argentina", code: "EZE" },

      // Asia
      { name: "Tokyo", country: "Japan", code: "NRT" },
      { name: "Seoul", country: "South Korea", code: "ICN" },
      { name: "Shanghai", country: "China", code: "PVG" },
      { name: "Bangkok", country: "Thailand", code: "BKK" },
      { name: "Singapore", country: "Singapore", code: "SIN" },
      { name: "Hong Kong", country: "Hong Kong", code: "HKG" },
      { name: "Mumbai", country: "India", code: "BOM" },
      { name: "Dubai", country: "UAE", code: "DXB" },

      // Oceania
      { name: "Sydney", country: "Australia", code: "SYD" },
      { name: "Melbourne", country: "Australia", code: "MEL" },
    ];

    function findCity(name) {
      const normalized = name.toLowerCase().trim();
      return cities.find(c => c.name.toLowerCase() === normalized);
    }

    function getFlightTime(city1, city2) {
      const key1 = `${city1.name}-${city2.name}`;
      const key2 = `${city2.name}-${city1.name}`;

      const route = flightRoutes[key1] || flightRoutes[key2];
      if (route) {
        return route;
      }

      // If no direct route found, estimate with connecting flight penalty
      return { time: Math.random() * 10 + 8, directFlights: 0 };
    }

    function findMeetingSpots(city1, city2) {
      if (!city1 || !city2) {
        throw new Error("Please enter both cities");
      }

      const route = getFlightTime(city1, city2);
      const directFlights = route.directFlights || 0;

      // Calculate flight times for all other cities
      const candidates = cities
        .filter(c => c.name !== city1.name && c.name !== city2.name)
        .map(c => {
          const flightTo1 = getFlightTime(city1, c);
          const flightTo2 = getFlightTime(city2, c);
          const timeDifference = Math.abs(flightTo1.time - flightTo2.time);

          // Balance score: lower time difference = higher score
          // Also factor in flight availability
          const balance = 100 - (timeDifference * 5);
          const flightQuality = (flightTo1.directFlights + flightTo2.directFlights) / 4;
          const centrality = Math.max(0, Math.round(balance + flightQuality));

          return {
            ...c,
            flightTime1: flightTo1.time,
            flightTime2: flightTo2.time,
            directFlights1: flightTo1.directFlights || 0,
            directFlights2: flightTo2.directFlights || 0,
            timeDifference: timeDifference.toFixed(1),
            centrality,
            totalTime: (flightTo1.time + flightTo2.time).toFixed(1)
          };
        })
        .sort((a, b) => b.centrality - a.centrality)
        .slice(0, 12);

      return {
        city1,
        city2,
        directFlights,
        flightTime: route.time,
        candidates
      };
    }

    function formatResults(results) {
      const { city1, city2, directFlights, flightTime, candidates } = results;

      if (candidates.length === 0) {
        return `
          <div class="no-results">
            <p>No intermediate cities found in our flight database. Try other major hub cities!</p>
          </div>
        `;
      }

      const resultsHTML = candidates.map(c => {
        const avgFlightTime = ((parseFloat(c.flightTime1) + parseFloat(c.flightTime2)) / 2).toFixed(1);
        const totalFlightHours = parseFloat(c.totalTime);

        return `
          <div class="city-result">
            <div class="city-name">${c.name}, ${c.country} <span style="font-size: 0.8rem; color: var(--muted); font-weight: normal;">(${c.code})</span></div>
            <p style="margin: 0.5rem 0 0; color: var(--muted); font-size: 0.95rem;">
              Balanced flight times with ${c.directFlights1 + c.directFlights2} daily direct flights available
            </p>
            <div class="city-stats">
              <div class="stat-box">
                <div class="stat-label">From ${city1.name}</div>
                <div class="stat-value">${c.flightTime1.toFixed(1)}h</div>
                <div style="font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;">${c.directFlights1} direct flights/day</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">From ${city2.name}</div>
                <div class="stat-value">${c.flightTime2.toFixed(1)}h</div>
                <div style="font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;">${c.directFlights2} direct flights/day</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Time Balance</div>
                <div class="stat-value">${c.timeDifference}h</div>
                <div style="font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;">difference</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">Total Trip</div>
                <div class="stat-value">${totalFlightHours}h</div>
                <div style="font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem;">combined</div>
              </div>
            </div>
            <div class="centrality-score">Balance Score: ${c.centrality}%</div>
          </div>
        `;
      }).join('');

      return `
        <div class="results-section">
          <div class="results-header">
            <h2>✈️ Best Meeting Cities</h2>
            <div class="results-info">
              Direct flights: <strong>${directFlights} daily</strong> | Flight time: <strong>${flightTime.toFixed(1)} hours</strong><br/>
              Finding balanced meeting points based on actual flight times and availability:
            </div>
          </div>
          ${resultsHTML}
        </div>
      `;
    }

    function handleSearch() {
      const city1Input = document.getElementById("city1").value.trim();
      const city2Input = document.getElementById("city2").value.trim();
      const resultsContainer = document.getElementById("resultsContainer");
      const searchBtn = document.getElementById("searchBtn");

      resultsContainer.innerHTML = '<div class="loading">Searching for flights</div>';
      searchBtn.disabled = true;

      setTimeout(() => {
        try {
          const city1 = findCity(city1Input);
          const city2 = findCity(city2Input);

          if (!city1) {
            throw new Error(`"${city1Input}" not found. Try a major hub like London, Paris, or Tokyo.`);
          }
          if (!city2) {
            throw new Error(`"${city2Input}" not found. Try a major hub like London, Paris, or Tokyo.`);
          }
          if (city1.name === city2.name) {
            throw new Error("Please choose two different cities!");
          }

          const results = findMeetingSpots(city1, city2);
          resultsContainer.innerHTML = formatResults(results);
        } catch (error) {
          resultsContainer.innerHTML = `<div class="error-message">❌ ${error.message}</div>`;
        } finally {
          searchBtn.disabled = false;
        }
      }, 300);
    }

    // Event listeners
    document.getElementById("searchBtn").addEventListener("click", handleSearch);
    document.getElementById("city1").addEventListener("keypress", e => {
      if (e.key === "Enter") {
        document.getElementById("city2").focus();
      }
    });
    document.getElementById("city2").addEventListener("keypress", e => {
      if (e.key === "Enter") {
        handleSearch();
      }
    });

    console.log("Available cities:", cities.map(c => c.name).join(", "));
  </script>
</body>
</html>
