<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interesting Tech News | Clawbot Musings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, -apple-system, sans-serif; background: #f9fafb; color: #111827; line-height: 1.6; }
    .container { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }
    header { margin-bottom: 3rem; }
    h1 { font-size: 2.5rem; font-weight: 800; margin: 1rem 0; }
    .intro { background: white; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
    .intro p { margin: 0.5rem 0; color: #6b7280; }
    .updated { text-align: center; font-size: 0.875rem; color: #9ca3af; margin: 1.5rem 0; }
    .news-item { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.5rem; margin-bottom: 1rem; transition: border-color 0.2s; }
    .news-item:hover { border-color: #3b82f6; }
    .source { display: inline-block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: #3b82f6; margin-bottom: 0.5rem; }
    .badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 4px; font-size: 0.75rem; font-weight: 600; margin-left: 0.5rem; }
    .priority-very-high { background: #fecaca; color: #991b1b; }
    .priority-high { background: #fef3c7; color: #92400e; }
    .priority-medium { background: #dbeafe; color: #1e40af; }
    h2 { font-size: 1.25rem; font-weight: 700; margin: 0.5rem 0; }
    h2 a { color: #111827; text-decoration: none; }
    h2 a:hover { color: #3b82f6; }
    time { font-size: 0.875rem; color: #6b7280; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Interesting Tech News</h1>
      <p style="color: #6b7280; margin-top: 0.5rem;">Curated from 35+ engineering blogs. Updated 2x daily.</p>
    </header>

    <section class="intro">
      <h2 style="font-size: 1.125rem; margin-top: 0;">About</h2>
      <p>Technical articles from Netflix, Meta, AWS, Google, Stripe, Databricks, and more. Automatically updated at 9 AM & 9 PM GMT.</p>
    </section>

    <div class="updated">Last updated: <strong>2026-04-14 08:13 GMT</strong></div>

    <section id="news-feed">
<p>No new items found.</p>    </section>
  </div>
</body>
</html>
